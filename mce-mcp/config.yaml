# Memory Classification Engine MCP Server Configuration

server:
  # Server host and port
  host: "0.0.0.0"
  port: 8080
  
  # Server timeout settings
  timeout: 30
  max_connections: 100

logging:
  # Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  
  # Log file path (optional)
  file: "mce-mcp.log"
  
  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

engine:
  # Memory Classification Engine settings
  enable_nudge: true
  nudge_interval: 86400  # 24 hours in seconds
  nudge_batch_size: 10
  
  # Storage settings
  storage_backend: "default"
  max_memory_size: 10000
  
  # Processing settings
  enable_execution_context: true
  enable_semantic_analysis: true

security:
  # CORS settings
  cors:
    enabled: true
    allowed_origins: ["*"]
    allowed_methods: ["POST"]
    allowed_headers: ["Content-Type", "Authorization"]
  
  # Rate limiting
  rate_limit:
    enabled: false
    max_requests: 100
    window_seconds: 60

monitoring:
  # Health check endpoint
  health_check:
    enabled: true
    path: "/health"
  
  # Metrics collection
  metrics:
    enabled: false
    path: "/metrics"
