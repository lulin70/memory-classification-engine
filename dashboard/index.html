<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCE Memory Quality Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .stat-card {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #007bff;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #007bff;
        }
        .stat-label {
            font-size: 14px;
            color: #6c757d;
            margin-top: 5px;
        }
        .chart-container {
            margin: 30px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        .table-container {
            margin: 30px 0;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .filter-bar {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-bar select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .refresh-btn {
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .refresh-btn:hover {
            background-color: #0069d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MCE Memory Quality Dashboard</h1>
        
        <div class="filter-bar">
            <select id="timeRange">
                <option value="7">Last 7 days</option>
                <option value="30">Last 30 days</option>
                <option value="90">Last 90 days</option>
            </select>
            <button class="refresh-btn" onclick="refreshData()">Refresh</button>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalMemories">0</div>
                <div class="stat-label">Total Memories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="averageQuality">0.00</div>
                <div class="stat-label">Average Quality</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="highQualityMemories">0</div>
                <div class="stat-label">High Quality Memories</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalProcessed">0</div>
                <div class="stat-label">Total Processed Messages</div>
            </div>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Memory Quality Over Time</div>
            <canvas id="qualityChart"></canvas>
        </div>
        
        <div class="chart-container">
            <div class="chart-title">Memory Type Distribution</div>
            <canvas id="typeChart"></canvas>
        </div>
        
        <div class="table-container">
            <h3>Memory Quality Details</h3>
            <table id="memoryTable">
                <thead>
                    <tr>
                        <th>Memory ID</th>
                        <th>Type</th>
                        <th>Content</th>
                        <th>Quality Score</th>
                        <th>Confidence</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody id="memoryTableBody">
                    <!-- Data will be populated by JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        let qualityChart, typeChart;
        
        // Sample data
        const sampleData = {
            total_memories: 127,
            average_quality: 0.85,
            high_quality_memories: 98,
            total_processed: 1542,
            type_distribution: {
                user_preference: 42,
                correction: 28,
                decision: 19,
                relationship: 15,
                task_pattern: 12,
                sentiment_marker: 7,
                fact_declaration: 4
            },
            quality_over_time: [
                { date: '2026-04-06', quality: 0.78 },
                { date: '2026-04-07', quality: 0.81 },
                { date: '2026-04-08', quality: 0.79 },
                { date: '2026-04-09', quality: 0.83 },
                { date: '2026-04-10', quality: 0.86 },
                { date: '2026-04-11', quality: 0.84 },
                { date: '2026-04-12', quality: 0.85 }
            ],
            memories: [
                { id: 'mem_001', type: 'user_preference', content: 'I prefer using double quotes', quality: 0.95, confidence: 0.95, created_at: '2026-04-12T10:00:00Z' },
                { id: 'mem_002', type: 'correction', content: 'Use spaces instead of tabs', quality: 0.92, confidence: 0.90, created_at: '2026-04-12T09:30:00Z' },
                { id: 'mem_003', type: 'decision', content: 'Project will use Python', quality: 0.89, confidence: 0.85, created_at: '2026-04-11T15:00:00Z' },
                { id: 'mem_004', type: 'relationship', content: 'John is responsible for backend', quality: 0.95, confidence: 0.95, created_at: '2026-04-11T14:30:00Z' },
                { id: 'mem_005', type: 'task_pattern', content: 'Run tests before deployment', quality: 0.91, confidence: 0.88, created_at: '2026-04-10T11:00:00Z' }
            ]
        };
        
        function initCharts() {
            // Quality over time chart
            const qualityCtx = document.getElementById('qualityChart').getContext('2d');
            qualityChart = new Chart(qualityCtx, {
                type: 'line',
                data: {
                    labels: sampleData.quality_over_time.map(item => item.date),
                    datasets: [{
                        label: 'Average Quality',
                        data: sampleData.quality_over_time.map(item => item.quality),
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    scales: {
                        y: {
                            min: 0.5,
                            max: 1.0,
                            title: {
                                display: true,
                                text: 'Quality Score'
                            }
                        }
                    }
                }
            });
            
            // Memory type distribution chart
            const typeCtx = document.getElementById('typeChart').getContext('2d');
            typeChart = new Chart(typeCtx, {
                type: 'pie',
                data: {
                    labels: Object.keys(sampleData.type_distribution),
                    datasets: [{
                        data: Object.values(sampleData.type_distribution),
                        backgroundColor: [
                            '#007bff',
                            '#28a745',
                            '#ffc107',
                            '#dc3545',
                            '#6f42c1',
                            '#17a2b8',
                            '#fd7e14'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'right',
                        }
                    }
                }
            });
        }
        
        function populateStats() {
            document.getElementById('totalMemories').textContent = sampleData.total_memories;
            document.getElementById('averageQuality').textContent = sampleData.average_quality.toFixed(2);
            document.getElementById('highQualityMemories').textContent = sampleData.high_quality_memories;
            document.getElementById('totalProcessed').textContent = sampleData.total_processed;
        }
        
        function populateTable() {
            const tableBody = document.getElementById('memoryTableBody');
            tableBody.innerHTML = '';
            
            sampleData.memories.forEach(memory => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${memory.id}</td>
                    <td>${memory.type}</td>
                    <td>${memory.content}</td>
                    <td>${memory.quality.toFixed(2)}</td>
                    <td>${memory.confidence.toFixed(2)}</td>
                    <td>${new Date(memory.created_at).toLocaleString()}</td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        function refreshData() {
            // In a real implementation, this would fetch data from the server
            // For now, we'll just simulate a refresh
            console.log('Refreshing data...');
            // You could add a loading indicator here
            setTimeout(() => {
                populateStats();
                populateTable();
                // Update charts if needed
                console.log('Data refreshed');
            }, 1000);
        }
        
        // Initialize the dashboard
        document.addEventListener('DOMContentLoaded', function() {
            initCharts();
            populateStats();
            populateTable();
        });
    </script>
</body>
</html>
